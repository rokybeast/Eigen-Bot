name: Question
description: Ask a question about setup, usage, or behavior
title: "[Question]: "
body:
  - type: markdown
    attributes:
      value: |
        Have a question? Ask here.

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to do, and what have you tried?
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots (optional)
      description: Paste any relevant output.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this.
          required: true
