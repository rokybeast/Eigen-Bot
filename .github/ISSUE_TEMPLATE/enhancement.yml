name: Enhancement
description: Improve an existing feature or behavior
title: "[Enhancement]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this for improvements to existing functionality (not brand-new features).

  - type: textarea
    id: current
    attributes:
      label: Current behavior
      description: What does Eigen-Bot do today?
    validations:
      required: true

  - type: textarea
    id: improvement
    attributes:
      label: Desired improvement
      description: What should change?
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Why is this improvement valuable? Who benefits?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, or related issues/PRs.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this.
          required: true
